# LushJr Bot Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Plugin Configuration
# Specify which plugin to use for each component
# Change these to swap implementations without modifying main.py
plugins:
  calendar: calendar_notion      # Options: calendar_notion, calendar_google, etc.
  ai: core_ai                    # Options: core_ai, openai_plugin, anthropic_plugin, etc.
  platform: platform_telegram    # Options: platform_telegram, platform_discord, platform_whatsapp, etc.

# Environment Variables
# These can be overridden by actual environment variables
environment:
  TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY}
  NOTION_TOKEN: ${NOTION_TOKEN}
  DATABASE_ID: ${DATABASE_ID}

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s │ %(levelname)s │ %(name)s │ %(message)s"

# Plugin-Specific Configuration

# Calendar Notion Plugin
calendar_notion:
  database_id: ${DATABASE_ID}
  notion_token: ${NOTION_TOKEN}
  prop_titulo: "Nombre"           # Property name for event title
  prop_fecha: "Fecha"             # Property name for event date
  prop_hora: "Hora"               # Property name for event time
  prop_lugar: "Lugar"             # Property name for event location
  prop_descripcion: "Descripción" # Property name for event description

# AI Provider Configuration

# Core AI (Nvidia)
core_ai:
  model: "meta/llama-3.3-8b-instruct"
  temperature_intent: 0.2
  temperature_chat: 0.7
  max_tokens_intent: 300
  max_tokens_chat: 1024

# Platform Configuration

# Telegram Bots
platform_telegram:
  connection_pool_size: 8
  connect_timeout: 30
  read_timeout: 90
  write_timeout: 30
  pool_timeout: 30
  message_chunk_size: 4096

# Feature Flags
features:
  function_calling: true    # Use AI function calling if available
  fallback_json_parsing: true  # Fall back to JSON parsing if function calling fails
  auto_chunk_messages: true    # Automatically chunk long messages for Telegram
